name: Build and Deploy Hugo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # si usas themes como submódulos
          fetch-depth: 0

      # 👉 Node para tener npm/npx disponibles
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 👉 Instala PostCSS y plugins (usa package-lock si lo tienes)
      - name: Install Node deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i
          fi

      # 👉 Instala Hugo extended
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Build
        env:
          HUGO_ENV: production
        run: hugo --minify

      # (Opcional) publica en GitHub Pages/gh-pages, o el paso que uses
      # - name: Deploy
      #   uses: peaceiris/actions-gh-pages@v3
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./public
